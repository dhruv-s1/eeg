<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoastGuard AI</title>
    <!-- INLINE DEVICE CHECK - Runs immediately before any rendering -->
    <script>
        (function() {
            const isMobileUA = /android|webos|iphone|ipod|blackberry|iemobile|opera mini|mobile|touch/i.test(navigator.userAgent.toLowerCase());
            const isSmallViewport = window.innerWidth <= 768;
            const isIPad = navigator.userAgent.includes('iPad');
            const isMobile = (isMobileUA && !isIPad) || (isSmallViewport && !isIPad);

            if (isMobile) {
                window.location.href = '/mobile-login';
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/device-router.js"></script>
    <style>
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.2);
            z-index: 100;
        }

        .back-link:hover {
            color: #00f0ff;
            background: rgba(0, 217, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.2);
        }

        .back-link::before {
            content: '←';
            display: inline-block;
            transition: transform 0.3s;
        }

        .back-link:hover::before {
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back</a>
    <div class="auth-box">
        <h2>🌊 Welcome to CoastGuard</h2>
        <p>UAE Coastal Restoration Monitoring</p>

        {% if error %}
        <div style="background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border-left: 4px solid #dc2626;">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="text" name="login" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="/signup">Sign Up</a></p>
    </div>
</body>
</html>
