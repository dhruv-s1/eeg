<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - CoastGuard AI</title>
    <!-- INLINE DEVICE CHECK - Runs immediately before any rendering -->
    <script>
        (function() {
            const isMobileUA = /android|webos|iphone|ipod|blackberry|iemobile|opera mini|mobile|touch/i.test(navigator.userAgent.toLowerCase());
            const isSmallViewport = window.innerWidth <= 768;
            const isIPad = navigator.userAgent.includes('iPad');
            const isMobile = (isMobileUA && !isIPad) || (isSmallViewport && !isIPad);

            if (isMobile) {
                window.location.href = '/mobile-map';
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="/static/device-router.js"></script>
    <style>
        .map-page-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #f0f8fb 0%, #ffffff 100%);
            overflow: hidden;
        }

        .map-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(0, 217, 255, 0.3);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 800;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideDown 0.6s ease-out;
        }

        .map-header h1 {
            font-size: 28px;
            color: var(--ocean-dark);
            font-weight: 700;
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--teal-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }

        .map-header .back-btn {
            position: absolute;
            left: 30px;
            background: linear-gradient(135deg, var(--teal-primary) 0%, var(--neon-cyan) 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .map-header .back-btn:hover {
            transform: translateX(-4px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
        }

        .map-content {
            display: flex;
            width: 100%;
            height: 100%;
            margin-top: 80px;
            gap: 0;
            background: white;
        }

        .map-wrapper {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #e0f4ff 0%, #f0f8fb 100%);
            border-radius: 14px;
            margin: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 14px;
        }

        .info-panel {
            width: 360px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-left: 2px solid rgba(0, 217, 255, 0.2);
            border-radius: 0 14px 14px 0;
            padding: 25px;
            overflow-y: auto;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.08);
            animation: slideInRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #infoPanel {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .info-card {
            border-left: 4px solid var(--teal-primary);
            padding: 16px;
            padding-left: 18px;
            background: rgba(240, 248, 251, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            transition: all 0.3s;
            animation: fadeInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .info-card:hover {
            background: rgba(240, 248, 251, 0.8);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.1);
        }

        .info-card h4 {
            color: var(--ocean-dark);
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--teal-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-card .detail {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 8px 0;
            color: #555;
        }

        .info-card .detail strong {
            color: var(--ocean-dark);
            font-weight: 700;
        }

        .loading-message {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 15px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 217, 255, 0.2);
            border-top: 3px solid var(--teal-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .map-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1) 0%, rgba(181, 0, 255, 0.05) 100%);
            border-radius: 10px;
            border: 1px solid rgba(0, 217, 255, 0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--teal-primary);
            animation: countUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stat-item-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Scrollbar styling */
        .info-panel::-webkit-scrollbar {
            width: 8px;
        }

        .info-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .info-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--teal-primary), var(--neon-cyan));
            border-radius: 10px;
        }

        .info-panel::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--neon-cyan), var(--teal-primary));
        }

        @media (max-width: 1024px) {
            .info-panel {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .map-page-container {
                flex-direction: column;
            }

            .map-content {
                flex-direction: column;
                margin-top: 0;
            }

            .map-wrapper {
                flex: 1;
                margin: 10px;
                border-radius: 0;
                min-height: 50vh;
            }

            .info-panel {
                width: 100%;
                height: auto;
                max-height: 45vh;
                border-left: none;
                border-top: 2px solid rgba(0, 217, 255, 0.2);
                border-radius: 0;
                padding: 15px;
            }

            .map-header {
                height: 70px;
                padding: 0 15px;
            }

            .map-header h1 {
                font-size: 20px;
                margin-left: 60px;
            }

            .map-header .back-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .map-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding: 12px;
                margin-bottom: 10px;
            }

            .stat-item-value {
                font-size: 18px;
            }

            .stat-item-label {
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            #infoPanel {
                gap: 10px;
            }

            .info-card {
                padding: 10px;
                padding-left: 14px;
            }

            .info-card h4 {
                font-size: 13px;
            }

            .info-card .detail {
                font-size: 12px;
                margin: 5px 0;
            }

            .stat-item-value {
                font-size: 16px;
            }

            .stat-item-label {
                font-size: 9px;
            }

            .map-header h1 {
                font-size: 16px;
                margin-left: 50px;
            }

            .map-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            #map {
                height: 100%;
            }

            .info-panel {
                max-height: 40vh;
                padding: 12px;
            }
        }

        @media (max-width: 360px) {
            .map-header {
                height: 60px;
            }

            .map-header h1 {
                font-size: 14px;
                margin-left: 45px;
            }

            .map-header .back-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .info-card {
                padding: 8px;
            }

            .stat-item-value {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="map-page-container">
        <div class="map-header">
            <a href="/dashboard" class="back-btn">← Dashboard</a>
            <h1 style="margin-left: 150px;">🗺️ Live Coastal Monitoring Map</h1>
        </div>

        <div class="map-content">
            <div class="map-wrapper">
                <div id="map"></div>
            </div>

            <div class="info-panel">
                <div class="map-stats">
                    <div class="stat-item">
                        <div class="stat-item-value" id="stat-drones-active">5</div>
                        <div class="stat-item-label">Active Drones</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value" id="stat-zones">5</div>
                        <div class="stat-item-label">Zones</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value" id="stat-coverage">245</div>
                        <div class="stat-item-label">km² Covered</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-item-value" id="stat-status">24/7</div>
                        <div class="stat-item-label">Monitoring</div>
                    </div>
                </div>

                <div id="infoPanel">
                    <div style="text-align: center; color: #888; padding: 20px;">
                        <div class="loading-spinner"></div>
                        <div>Click on map markers to view zone details</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/scroll-animations.js"></script>
    <script src="/static/map.js"></script>
</body>
</html>
